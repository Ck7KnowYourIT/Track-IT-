<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Track-IT | CK7 #KnowYourIT</title>

  <style>
    :root{
      --bg1:#f8fafc;
      --bg2:#eef2ff;
      --card:#ffffff;
      --stroke:rgba(15,23,42,.10);
      --text:#0f172a;
      --muted:rgba(15,23,42,.70);
      --muted2:rgba(15,23,42,.55);
      --shadow:0 18px 45px rgba(2,6,23,.12);
      --radius:18px;
      --cta:#0f172a;
      --ctaText:#ffffff;
      --soft:rgba(255,255,255,.72);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(99,102,241,.18), transparent 60%),
        radial-gradient(900px 500px at 85% 15%, rgba(34,197,94,.12), transparent 55%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height:100vh;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:22px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      background:var(--soft);
      backdrop-filter:blur(10px);
      border:1px solid rgba(15,23,42,.10);
      border-radius:999px;
      padding:10px 12px;
      box-shadow:0 10px 26px rgba(2,6,23,.10);
    }

    .nav{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(15,23,42,.10);
      background:rgba(15,23,42,.03);
      text-decoration:none;
      color:var(--text);
    }

    .brandLogo{
      height:28px;
      width:auto;
      display:block;
    }

    .brand b{
      letter-spacing:.2px;
    }

    .spacer{
      flex:1;
    }

    .tab{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(15,23,42,.10);
      background:rgba(255,255,255,.55);
      color:var(--text);
      text-decoration:none;
      font-weight:650;
      font-size:14px;
      transition:.15s ease;
      white-space:nowrap;
    }

    .tab:hover{
      background:rgba(15,23,42,.04);
    }

    .hero{
      margin-top:18px;
      background:rgba(255,255,255,.70);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:34px;
      overflow:hidden;
      position:relative;
    }

    .hero h1{
      margin:0 0 10px 0;
      font-size:44px;
      line-height:1.05;
      letter-spacing:-.6px;
    }

    .hero p{
      margin:0 0 18px 0;
      color:var(--muted);
      font-size:17px;
      line-height:1.55;
      max-width:860px;
    }

    .pillrow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }

    .pill{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(15,23,42,.10);
      color:var(--muted);
      background:rgba(255,255,255,.75);
      font-size:13px;
      display:inline-flex;
      gap:8px;
      align-items:center;
    }

    .sectionTitle{
      margin:22px 0 10px 0;
      font-size:16px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.2px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
      margin-top:10px;
    }

    .card{
      background:rgba(255,255,255,.78);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:0 10px 26px rgba(2,6,23,.08);
      padding:18px;
    }

    .btnRow{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:12px;
      font-weight:900;
      text-decoration:none;
      border:1px solid rgba(15,23,42,.10);
      transition:.15s ease;
      white-space:nowrap;
    }

    .btn.primary{
      background:var(--cta);
      color:var(--ctaText);
      border-color:transparent;
      box-shadow:0 12px 28px rgba(2,6,23,.18);
    }

    .btn.primary:hover{
      transform:translateY(-1px);
      filter:brightness(.98);
    }

    .btn.ghost{
      background:rgba(255,255,255,.78);
      color:var(--text);
    }

    .steps{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
      margin-top:10px;
    }

    .step{
      background:rgba(255,255,255,.70);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      padding:18px;
    }

    .trust{
      margin-top:20px;
      padding:16px 18px;
      background:rgba(255,255,255,.68);
      border:1px solid var(--stroke);
      border-radius:14px;
      text-align:center;
    }

    .footer{
      margin:26px 0 12px 0;
      color:var(--muted2);
      font-size:12px;
      text-align:center;
    }

    @media (max-width:980px){
      .spacer{display:none}
      .grid,.steps{grid-template-columns:1fr}
      .hero h1{font-size:36px}
    }

    /* MOBILE FEINSCHLIFF */
    @media (max-width:600px){

      .wrap{
        padding:14px;
      }

      .hero{
        padding:22px;
      }

      .hero h1{
        font-size:30px;
      }

      .hero p{
        font-size:16px;
      }

      .card,
      .step{
        padding:20px;
      }

      .brandLogo{
        height:24px;
      }

      .tab{
        font-size:13px;
        padding:9px 11px;
      }

    }

  </style>
</head>
